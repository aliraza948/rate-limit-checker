# ╔══════════════════════════════════════════════════════════╗
# ║           Rate Limit Checker Bot  –  config.ini          ║
# ╚══════════════════════════════════════════════════════════╝
# Copy this file to config.ini and edit it before running.

# ────────────────────────────────────────────────────────────
[DRIVER]
# ────────────────────────────────────────────────────────────
# Choose the HTTP engine for sending requests.
#
#   curl_cffi   – Fastest. Uses curl_cffi with TLS/HTTP2 browser
#                 fingerprinting. No real browser launched.
#                 Install: pip install curl_cffi
#
#   chromium    – Launches Playwright locked to Chromium.
#                 Full JS execution, real browser cookies/headers.
#                 Install: pip install playwright && playwright install chromium
#
#   playwright  – Launches Playwright with your chosen pw_browser below
#                 (chromium / firefox / webkit).
#                 Install: pip install playwright && playwright install <browser>
#
engine = curl_cffi


# ────────────────────────────────────────────────────────────
[URLS]
# ────────────────────────────────────────────────────────────
# One URL per line. Blank lines and lines starting with # are ignored.
# All threads cycle round-robin across the list.
urls =
    https://www.goat.com/sneakers/air-jordan-7-retro-miro-2026-iq6573-100


# ────────────────────────────────────────────────────────────
[REQUEST]
# ────────────────────────────────────────────────────────────
# HTTP method applied to every URL: GET, POST, HEAD
method = GET

# Request body for POST requests (raw JSON string, leave blank for GET/HEAD)
body =

# Extra headers as comma-separated Key:Value pairs
# Example: Authorization:Bearer token123, X-Custom:value
headers =


# ────────────────────────────────────────────────────────────
[RATE_LIMITS]
# ────────────────────────────────────────────────────────────
# Max requests per rolling window across ALL urls combined.
# Set to 0 for unlimited.
per_minute   = 60
per_hour     = 1000
per_day      = 10000
per_week     = 50000
per_month    = 150000

# Pause (seconds) between successive requests within a single thread.
# Increase for human-like pacing; set to 0 for maximum throughput.
request_delay = 1.0


# ────────────────────────────────────────────────────────────
[THREADS]
# ────────────────────────────────────────────────────────────
# Number of concurrent worker threads.
# For Playwright engines keep this low (5–10); browsers are heavy.
# For curl_cffi you can safely go up to 25–50.
count = 5

# Seconds to wait between starting each thread (staggered ramp-up).
# Avoids a burst on startup. 0 = start all threads simultaneously.
ramp_up = 0.5


# ────────────────────────────────────────────────────────────
[BEHAVIOR]
# ────────────────────────────────────────────────────────────
# How long to run in seconds (0 = run forever until Ctrl+C).
run_duration = 0

# Stop ALL threads the moment any 429 response is received.
stop_on_rate_limit = false

# Retry on these HTTP status codes (comma-separated).
retry_codes = 429, 503

# Seconds to wait before each retry attempt.
retry_delay = 5.0

# Maximum retry attempts per request before giving up.
max_retries = 3


# ────────────────────────────────────────────────────────────
[IMPERSONATION]
# ────────────────────────────────────────────────────────────
# ── curl_cffi settings (used when engine = curl_cffi) ───────
# TLS/HTTP2 fingerprint profile to impersonate.
# Options: chrome110, chrome107, chrome104, chrome101, chrome100, chrome99,
#          safari15_3, safari15_5, safari17_0, firefox102, firefox104
browser = chrome110

# ── Playwright settings (used when engine = playwright/chromium) ─
# Which browser Playwright should launch (ignored for engine=chromium).
# Options: chromium, firefox, webkit
pw_browser = chromium

# Run Playwright browser without a visible window.
# Set to false to watch the browser while debugging.
headless = true

# ── Shared ──────────────────────────────────────────────────
# Rotate User-Agent strings across threads (true/false).
rotate_ua = true


# ────────────────────────────────────────────────────────────
[LOGGING]
# ────────────────────────────────────────────────────────────
# Log file name (written inside the logs/ folder).
# Leave blank to disable file logging.
log_file = rate_limit_bot.log

# JSON stats file name (written inside the stats/ folder).
# Updated every stats_interval seconds and on shutdown.
stat_file = bot_stats.json

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Print a live summary to the terminal every N seconds (0 = disable).
stats_interval = 10

# Log only non-200 responses (reduces noise during long runs).
log_errors_only = false

# ─────────────────────────────────────────────────────────────────────────────
#  VERIFICATION  –  paste this block into your config.ini
#  (keep the [VERIFICATION] header; INI sections use square brackets)
# ─────────────────────────────────────────────────────────────────────────────
#
#  Works with ALL engines:
#    curl_cffi  →  response HTML is parsed by BeautifulSoup 4 (pip install beautifulsoup4)
#    playwright →  Playwright's built-in wait_for_selector is used (with timeout)
#    chromium   →  same as playwright
#
#  Flow:
#    1. Request is sent normally.
#    2. If HTTP 200, and enabled = true, and selector is set →
#         curl  : parse HTML, find CSS selector, optionally check inner text
#         browser: wait up to `timeout` seconds for selector to appear in DOM,
#                  then optionally check inner text
#    3. PASS / FAIL is logged according to log_pass / log_fail flags.
#    4. A failed verification does NOT count as a request error – it is purely
#       informational unless you add stop-on-fail logic yourself.
# ─────────────────────────────────────────────────────────────────────────────

[VERIFICATION]

# Master switch – set to false to skip all verification without removing config
enabled = true

# CSS selector to look for in the response.
# Both engines support standard CSS selectors:
#   div.my-class          – element with class
#   #main-content         – element by ID
#   h1                    – tag name
#   .rate-limit-remaining – class selector
#   [data-testid=status]  – attribute selector
#
# curl_cffi engine only:  XPath (//...) is NOT supported; use CSS.
# playwright / chromium:  XPath IS supported (e.g. //h1[@class='title']).
selector = div[data-qa="swiper_carousel"]

# (Optional) Text the selected element must contain (case-insensitive substring match).
# Leave blank to only check presence of the element.
contains =

# Timeout in seconds.
#   curl / bs4   : this value is not used for waiting (HTML is already downloaded),
#                  but is logged for reference.
#   playwright   : the driver will wait up to this many seconds for the selector
#                  to appear in the DOM (useful for JS-rendered pages).
timeout = 5

# Log a line when verification passes  (set false to reduce noise)
log_pass = true

# Log a line when verification fails
log_fail = true


# ─────────────────────────────────────────────────────────────────────────────
#  QUICK-START EXAMPLES
# ─────────────────────────────────────────────────────────────────────────────
# Example 1 – check that a login wall is NOT shown (page loaded cleanly):
#   selector = main#app
#   contains =
#   timeout  = 5

# Example 2 – verify a specific heading appeared (JS-rendered, browser engine):
#   selector  = h1.page-title
#   contains  = Welcome
#   timeout   = 15

# Example 3 – check remaining-rate-limit badge is present:
#   selector = span[data-testid="rate-limit-remaining"]
#   contains =
#   timeout  = 8

# Example 4 – disabled (no verification at all):
#   enabled = false