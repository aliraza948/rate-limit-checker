[URLS]
# One URL per line. Blank lines and lines starting with # are ignored.
# Each URL is hit round-robin across all threads.
# Format: URL  (method and body are shared from [REQUEST] below)
urls =
    https://www.goat.com/sneakers/air-jordan-7-retro-miro-2026-iq6573-100

[REQUEST]
# HTTP method for all URLs: GET, POST, HEAD
method = GET

# Request body for POST (JSON string or empty)
body =

# Extra headers (comma-separated key:value pairs)
# Example: Authorization:Bearer token123, X-Custom:value
headers =

[RATE_LIMITS]
# Max requests per time window across ALL urls combined (0 = unlimited)
per_minute   = 60
per_hour     = 1000
per_day      = 10000
per_week     = 50000
per_month    = 150000

# Pause (seconds) between requests within a thread
request_delay = 1.0

[THREADS]
# Number of concurrent threads
count = 25

# Thread ramp-up delay (seconds between starting each thread)
ramp_up = 0.5

[BEHAVIOR]
# How long to run in seconds (0 = run forever until Ctrl+C)
run_duration = 0

# Stop all threads when a rate-limit (429) is detected
stop_on_rate_limit = false

# Retry on these status codes (comma-separated)
retry_codes = 429, 503
retry_delay = 5.0
max_retries = 3

[IMPERSONATION]
# Browser to impersonate via curl_cffi
# Options: chrome110, chrome107, chrome104, chrome101, chrome100, chrome99,
#          safari15_3, safari15_5, safari17_0, firefox102, firefox104
browser = chrome110

# Rotate user-agents across threads (true/false)
rotate_ua = true

[LOGGING]
# Log file path (leave blank to disable file logging)
log_file = rate_limit_bot.log

# JSON stat file – updated every stats_interval seconds and on shutdown
stat_file = bot_stats.json

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Print live stats every N seconds (0 = disable)
stats_interval = 10

# Log only non-200 responses (reduces noise)
log_errors_only = false